version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: findface_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  python-service:
    build: ./python-service
    container_name: findface_python_service
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: findface_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/face_recognition
      - PYTHON_SERVICE_URL=http://python-service:5001
      - FRONTEND_URL=http://localhost:3000 # Update this for production
      # Note: add other environment variables from backend/.env here manually for production, or uncomment env_file
    # env_file:
    #   - ./backend/.env
    depends_on:
      - mongodb
      - python-service
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:5000/api # Update to your backend domain for production!
    container_name: findface_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
